<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人信息卡片</title>
    <style>
        /* 全局样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        /* 页面整体布局 */
        body {
            background-color: #f0f2f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* 页面标题 */
        .page-title {
            font-size: 28px;
            color: #333;
            margin-bottom: 30px;
            text-align: center;
        }

        /* 卡片主体样式 */
        .card {
            width: 100%;
            max-width: 450px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
            padding: 40px 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.3s ease; /* 卡片动画 */
        }

        .card:hover {
            transform: translateY(-5px); /* 悬浮上浮效果 */
        }

        /* 头像区域 */
        .avatar-container {
            position: relative;
            margin-bottom: 25px;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid #e3f2fd;
            cursor: pointer;
            transition: border-color 0.3s;
        }

        .avatar:hover {
            border-color: #2196f3;
        }

        /* 隐藏上传文件按钮 */
        #avatarInput {
            display: none;
        }

        /* 信息展示区域 */
        .info-display {
            text-align: center;
            margin-bottom: 20px;
            width: 100%;
        }

        #nameDisplay {
            font-size: 24px;
            font-weight: bold;
            color: #222;
            margin-bottom: 15px;
        }

        #bioDisplay {
            font-size: 16px;
            color: #666;
            line-height: 1.6;
            min-height: 40px;
            padding: 0 10px;
        }

        /* 编辑区域 */
        .edit-area {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 10px;
        }

        .input-field {
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s;
        }

        .input-field:focus {
            border-color: #2196f3;
        }

        /* 保存按钮 */
        #saveBtn {
            padding: 12px;
            background-color: #2196f3;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        #saveBtn:hover {
            background-color: #1976d2;
        }
    </style>
</head>
<body>
    <h1 class="page-title">个人信息卡片</h1>

    <!-- 信息卡片 -->
    <div class="card">
        <!-- 头像区域 -->
        <div class="avatar-container">
            <img id="avatarPreview" class="avatar" src="https://picsum.photos/200/200" alt="头像">
            <input type="file" id="avatarInput" accept="image/*">
        </div>

        <!-- 信息展示 -->
        <div class="info-display">
            <div id="nameDisplay">点击编辑修改姓名</div>
            <div id="bioDisplay">点击编辑修改个人简介</div>
        </div>

        <!-- 编辑区域 -->
        <div class="edit-area">
            <input type="text" id="nameInput" class="input-field" placeholder="请输入姓名">
            <textarea id="bioInput" class="input-field" rows="3" placeholder="请输入个人简介"></textarea>
            <button id="saveBtn">保存修改</button>
        </div>
    </div>

    <script>
        // 获取页面元素
        const avatarPreview = document.getElementById('avatarPreview');
        const avatarInput = document.getElementById('avatarInput');
        const nameDisplay = document.getElementById('nameDisplay');
        const bioDisplay = document.getElementById('bioDisplay');
        const nameInput = document.getElementById('nameInput');
        const bioInput = document.getElementById('bioInput');
        const saveBtn = document.getElementById('saveBtn');

        // 1. 点击头像触发文件上传
        avatarPreview.addEventListener('click', () => {
            avatarInput.click();
        });

        // 2. 头像上传实时预览
        avatarInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                // 创建文件读取对象
                const reader = new FileReader();
                reader.onload = (event) => {
                    // 更换头像图片
                    avatarPreview.src = event.target.result;
                };
                // 读取图片文件
                reader.readAsDataURL(file);
            }
        });

        // 3. 保存按钮功能
        saveBtn.addEventListener('click', () => {
            // 获取输入框内容
            const newName = nameInput.value.trim();
            const newBio = bioInput.value.trim();

            // 更新显示内容（如果输入不为空）
            if (newName) {
                nameDisplay.textContent = newName;
            }
            if (newBio) {
                bioDisplay.textContent = newBio;
            }

            // 保存后清空输入框（提升体验）
            nameInput.value = '';
            bioInput.value = '';

            // 提示保存成功
            alert('信息保存成功！');
        });
    </script>
</body>
</html>
